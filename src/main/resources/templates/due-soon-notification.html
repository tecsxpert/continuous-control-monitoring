<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; color: #333; }
        .header { background: #e67e22; color: white; padding: 16px 24px; }
        .body   { padding: 24px; }
        .footer { font-size: 11px; color: #999; padding: 16px 24px;
                  border-top: 1px solid #eee; }
    </style>
</head>
<body>
<div class="header"><h2>📅 Control Due in 7 Days</h2></div>
<div class="body">
    <p>Dear Team,</p>
    <p>The following control item is due within the next <strong>7 days</strong>:</p>
    <table style="border-collapse:collapse; width:100%;">
        <tr><td style="padding:8px; font-weight:bold;">Title</td>
            <td th:text="${item.title}"></td></tr>
        <tr style="background:#f9f9f9;">
            <td style="padding:8px; font-weight:bold;">Category</td>
            <td th:text="${item.category}"></td></tr>
        <tr><td style="padding:8px; font-weight:bold;">Due Date</td>
            <td th:text="${item.dueDate}"></td></tr>
        <tr style="background:#f9f9f9;">
            <td style="padding:8px; font-weight:bold;">Priority</td>
            <td th:text="${item.priority}"></td></tr>
    </table>
    <p style="margin-top:20px;">Please ensure this control is reviewed before the due date.</p>
</div>
<div class="footer">Continuous Control Monitoring System</div>
</body>
</html>
